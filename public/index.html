<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>Weekly Project Home | 비주얼 프로젝트 피드</title>
  <meta name="description" content="공개 프로젝트들이 제공하는 이미지, GIF, 영상, 미니게임 포스트를 모아 보는 정적 소셜 피드입니다.">
  <meta name="keywords" content="weekly project, portfolio, visual feed, github pages, game art">
  <meta name="author" content="Gameyang">
  <meta name="application-name" content="Weekly Project Home">
  <meta name="apple-mobile-web-app-title" content="Weekly Project Home">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Weekly Project Home | 비주얼 프로젝트 피드">
  <meta property="og:description" content="공개 프로젝트의 시각 결과물을 소셜 피드 방식으로 모아 보는 GitHub Pages 허브입니다.">
  <meta property="og:image" content="assets/thumbnails/example-week-01.png">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Weekly Project Home | 비주얼 프로젝트 피드">
  <meta property="twitter:description" content="공개 프로젝트의 시각 결과물을 피드 방식으로 모아 보는 GitHub Pages 허브입니다.">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">

  <link rel="stylesheet" href="css/style.css">
</head>
<body data-comments-repo="Gameyang/home" data-comments-theme="github-light" data-comments-label="feed-comment">
  <!-- Ambient Particle Canvas Background -->
  <canvas id="ambient-canvas"></canvas>

  <header class="topbar">
    <a class="brand" href="./" aria-label="Weekly Project Home">
      <div class="brand-logo-container">
        <svg class="brand-logo-svg" viewBox="0 0 100 100" width="42" height="42" aria-hidden="true">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="var(--logo-start)" />
              <stop offset="100%" stop-color="var(--logo-end)" />
            </linearGradient>
          </defs>
          <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#logo-grad)" />
          <path d="M25 35 L40 68 L50 46 L60 68 L75 35" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <span>
        <strong>Weekly Project Home</strong>
        <small>@Gameyang</small>
      </span>
    </a>
    <nav class="topnav" aria-label="주요 링크">
      <a href="#feed">Feed</a>
      <button class="theme-toggle" id="theme-toggle-btn" type="button" aria-label="화면 테마 변경">
        <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
      </button>
    </nav>
  </header>

  <main class="page-shell">
    <section class="feed-column" id="feed" aria-label="프로젝트 피드">
      <section class="feed-list" id="projects-feed" aria-live="polite">
      </section>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Weekly Project Home. Public visual feed for personal non-commercial AI learning projects.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
